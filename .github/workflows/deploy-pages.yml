name: Deploy leaderboard to GitHub Pages

# Builds the epistemic-bench leaderboard and publishes it to GitHub Pages.
#
# There are no real model results yet, so this renders the deterministic *demo*
# build (the mock adapter, fully offline). The published page is clearly stamped
# as synthetic. To publish real results later, swap the build step for a real
# run (`epb run ... && epb score ... && epb aggregate ... && epb report ...`)
# and add the relevant provider API keys as repository secrets.
#
# Requires repo Settings -> Pages -> "Build and deployment" -> Source:
# "GitHub Actions" (one-time setup).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Least privilege needed to publish to Pages via the deploy action.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deployment at a time; let an in-flight production deploy finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Build leaderboard (demo / synthetic data)
        run: epb demo --site site/out

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
