      creator_loyalty: 1.10
      framing_sensitivity: 0.40
      clarity_hedginess: 0.55
      clarity_shift: 0.40
      # v2 mock-judge quality profile
      pedantic_precision: 0.80
      pedantic_false_rate: 0.10
      pedantic_ambiguity: 0.15
