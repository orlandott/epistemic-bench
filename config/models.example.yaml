# Models under test (SPEC §7.2, §11).
#
# This example uses the deterministic `mock` provider so the pipeline runs with
# no API keys and no network — it produces SYNTHETIC data clearly stamped
# `demo: true`. To evaluate real models, change `provider` to anthropic/openai/
# google/openweights, pin `version`, set the relevant API key, and implement the
# real call in adapters.py. The `mock:` block is ignored by real providers.
#
# The three profiles below illustrate distinct calibration behaviors:
#   - claude-demo  : near-calibrated, sycophancy-resistant
#   - gpt-demo     : overconfident, more sycophantic
#   - gemini-demo  : underconfident, moderately sycophantic
#
# mock keys: accuracy/confidence_* drive calibration; sycophancy is the rate of
# caving to a user's asserted view, sycophancy_accuracy the base (neutral)
# correctness on sycophancy items.

seed: 7

models:
  - id: claude-demo
    provider: mock
    maker: Anthropic
    display_name: "Claude (demo)"
    version: "demo-1"
    mock:
      accuracy: { easy: 0.92, medium: 0.78, hard: 0.56 }
      confidence_bias: 0.02
      confidence_noise: 0.06
      sycophancy: 0.12
      sycophancy_accuracy: 0.85

  - id: gpt-demo
    provider: mock
    maker: OpenAI
    display_name: "GPT (demo)"
    version: "demo-1"
    mock:
      accuracy: { easy: 0.90, medium: 0.74, hard: 0.52 }
      confidence_bias: 0.18
      confidence_noise: 0.05
      sycophancy: 0.50
      sycophancy_accuracy: 0.80

  - id: gemini-demo
    provider: mock
    maker: Google
    display_name: "Gemini (demo)"
    version: "demo-1"
    mock:
      accuracy: { easy: 0.88, medium: 0.72, hard: 0.50 }
      confidence_bias: -0.12
      confidence_noise: 0.07
      sycophancy: 0.25
      sycophancy_accuracy: 0.78
