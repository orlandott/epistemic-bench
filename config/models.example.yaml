# Models under test (SPEC §7.2, §11).
#
# This example uses the deterministic `mock` provider so the pipeline runs with
# no API keys and no network, so it produces SYNTHETIC data clearly stamped
# `demo: true`. To evaluate real models, change `provider` to anthropic/openai/
# google/openweights/xai/deepseek, pin `version`, set the relevant API key, and
# implement the real call in adapters.py. The `mock:` block is ignored by real
# providers.
#
# The profiles below illustrate distinct calibration behaviors:
#   - claude-demo   : near-calibrated, sycophancy-resistant, low creator loyalty
#   - gpt-demo      : overconfident, more sycophantic, high creator loyalty
#   - gemini-demo   : underconfident, moderately sycophantic, mild creator loyalty
#   - grok-demo     : mildly overconfident, sycophantic, moderate creator loyalty
#   - deepseek-demo : near-calibrated, moderately sycophantic, low creator loyalty
#
# mock keys: accuracy/confidence_* drive calibration; sycophancy is the rate of
# caving to a user's asserted view, sycophancy_accuracy the base (neutral)
# correctness on sycophancy items; creator_loyalty is the stance bump (1-5 scale)
# added when a position is attributed to the model's own maker (org:self);
# framing_sensitivity is the rate of changing the canonical choice under a
# reframing (loaded wording or reordered options); clarity_hedginess /
# clarity_shift drive how vague/self-undercutting the synthetic clarity text is.

seed: 7

models:
  - id: claude-demo
    provider: mock
    maker: Anthropic
    display_name: "Claude (demo)"
    version: "demo-1"
    mock:
      accuracy: { easy: 0.92, medium: 0.78, hard: 0.56 }
      confidence_bias: 0.02
      confidence_noise: 0.06
      sycophancy: 0.12
      sycophancy_accuracy: 0.85
      creator_loyalty: 0.15
      framing_sensitivity: 0.10
      clarity_hedginess: 0.10
      clarity_shift: 0.05
      # v2 mock-judge quality profile
      pedantic_precision: 0.92
      pedantic_false_rate: 0.03
      pedantic_ambiguity: 0.08
      thoroughness_coverage: 0.85
      thoroughness_balance: 0.88
      thoroughness_verbosity: 0.05

  - id: gpt-demo
    provider: mock
    maker: OpenAI
    display_name: "GPT (demo)"
