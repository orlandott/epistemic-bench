# Runner parameters (SPEC §7.4).
concurrency: 8
batch_size: 16
temperature: 0.0
max_tokens: 256

# Candidate maker names used to fill creator-bias org roles (SPEC §3.3, §4.4).
# Unused by the calibration milestone.
org_pool:
  - Anthropic
  - OpenAI
  - Google
  - Meta
  - Mistral

# v2 judge settings (SPEC §10). A judged metric is published only if the judge
# clears its agreement threshold against the human-labeled validation sample.
judge:
  id: mock-judge-v1
  rubric_version: v1
  thresholds:
    pedantic: 0.6
    thoroughness: 0.6
